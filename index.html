<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ecosystem Simulator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111;
            color: #ccc;
            font-family: monospace;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            gap: 12px;
            min-height: 100vh;
        }

        h1 {
            color: #eee;
            font-size: 15px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ── Config panel ── */
        #config-panel {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 16px 20px;
            width: 700px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px 20px;
        }

        .config-field {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .config-field label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .config-field input {
            background: #111;
            border: 1px solid #333;
            border-radius: 3px;
            color: #eee;
            font-family: monospace;
            font-size: 13px;
            padding: 4px 7px;
            width: 100%;
        }

        .config-field input:focus {
            outline: none;
            border-color: #555;
        }

        /* ── Buttons ── */
        .btn-row {
            display: flex;
            gap: 8px;
        }

        button {
            font-family: monospace;
            font-size: 13px;
            padding: 7px 18px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #444;
            background: #222;
            color: #eee;
            transition: background 0.1s;
        }

        button:hover { background: #2e2e2e; }
        button:active { background: #383838; }

        button#btn-start {
            background: #1d4a1d;
            border-color: #2e7a2e;
            color: #8fdb8f;
        }

        button#btn-start:hover { background: #245724; }

        button#btn-pause {
            background: #3a2e10;
            border-color: #7a621e;
            color: #e0c060;
            display: none;
        }

        button#btn-pause:hover { background: #4a3a14; }
        button#btn-pause.paused {
            background: #1a2e3a;
            border-color: #2a6080;
            color: #60b0d8;
        }

        /* ── Main area ── */
        #main {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        /* ── Canvas wrapper ── */
        #canvas-wrap {
            position: relative;
            cursor: default;
        }

        #canvas-wrap.paused { cursor: crosshair; }

        canvas {
            display: block;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
        }

        /* Inspect crosshair overlay */
        #crosshair {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
        }

        #crosshair .ch-h {
            position: absolute;
            left: 0; right: 0;
            height: 1px;
            background: rgba(255,255,255,0.15);
        }

        #crosshair .ch-v {
            position: absolute;
            top: 0; bottom: 0;
            width: 1px;
            background: rgba(255,255,255,0.15);
        }

        #crosshair .ch-cell {
            position: absolute;
            border: 1px solid rgba(255,255,255,0.6);
            pointer-events: none;
        }

        /* ── Right panel ── */
        #right-panel {
            width: 190px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-self: stretch;
        }

        #stats {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 12px;
            line-height: 1.9;
            color: #bbb;
        }

        #stats .stat-val { color: #eee; }

        /* ── Inspect panel ── */
        #inspect-panel {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 12px;
            line-height: 1.8;
            flex: 1;
            overflow-y: auto;
        }

        #inspect-panel .inspect-title {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        #inspect-panel .inspect-coord {
            color: #aaa;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .creature-entry {
            border-top: 1px solid #2a2a2a;
            padding-top: 6px;
            margin-top: 6px;
        }

        .creature-entry .creature-color-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }

        .creature-entry .entry-label { color: #666; font-size: 11px; }
        .creature-entry .entry-val { color: #ddd; }

        .food-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: gray;
            margin-right: 5px;
            vertical-align: middle;
        }

        .empty-cell { color: #555; font-size: 12px; }

        #pause-hint {
            color: #555;
            font-size: 11px;
            text-align: center;
            display: none;
        }

        /* ── Chart ── */
        #chart-wrap {
            display: none;
            flex-direction: column;
            gap: 6px;
        }

        #chart {
            display: block;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
        }

        #chart-legend {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #888;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<h1>Ecosystem Simulator</h1>

<div id="config-panel">
    <div class="config-grid">
        <div class="config-field">
            <label>Grid Size</label>
            <input type="number" id="cfg-grid-size" value="50">
        </div>
        <div class="config-field">
            <label>Cell Size (px)</label>
            <input type="number" id="cfg-cell-size" value="12">
        </div>
        <div class="config-field">
            <label>Ticks / Second</label>
            <input type="number" id="cfg-ticks-per-second" value="20">
        </div>
        <div class="config-field">
            <label>Starting Creatures</label>
            <input type="number" id="cfg-creatures-count" value="10">
        </div>
        <div class="config-field">
            <label>Starting Food</label>
            <input type="number" id="cfg-start-food" value="300">
        </div>
        <div class="config-field">
            <label>Food Creation Rate</label>
            <input type="number" id="cfg-food-rate" value="0.5" step="0.1">
        </div>
        <div class="config-field">
            <label>Start Energy</label>
            <input type="number" id="cfg-start-energy" value="100">
        </div>
        <div class="config-field">
            <label>Max Energy</label>
            <input type="number" id="cfg-max-energy" value="550">
        </div>
        <div class="config-field">
            <label>Energy / Food</label>
            <input type="number" id="cfg-energy-food" value="50">
        </div>
        <div class="config-field">
            <label>Energy Loss / Tick</label>
            <input type="number" id="cfg-energy-loss" value="1" step="0.1">
        </div>
        <div class="config-field">
            <label>Gene Cost Min</label>
            <input type="number" id="cfg-gene-min" value="0.75" step="0.05">
        </div>
        <div class="config-field">
            <label>Gene Cost Max</label>
            <input type="number" id="cfg-gene-max" value="1.25" step="0.05">
        </div>
        <div class="config-field">
            <label>Repro. Threshold</label>
            <input type="number" id="cfg-repro-energy" value="200">
        </div>
        <div class="config-field">
            <label>Mutation Rate</label>
            <input type="number" id="cfg-mutation-rate" value="0.05" step="0.001">
        </div>
        <div class="config-field">
            <label>Age Cost Factor</label>
            <input type="number" id="cfg-age-cost-factor" value="1000">
        </div>
    </div>

    <div class="btn-row">
        <button id="btn-start">&#9654; Start</button>
        <button id="btn-pause">&#9208; Pause</button>
        <button id="btn-slower" disabled>&#8722; Slower</button>
        <span id="speed-display" style="color:#888; font-family:monospace; font-size:13px; align-self:center; min-width:60px; text-align:center;"></span>
        <button id="btn-faster" disabled>+ Faster</button>
    </div>
</div>

<div id="main">
    <div id="canvas-wrap">
        <canvas id="world"></canvas>
        <div id="crosshair">
            <div class="ch-h" id="ch-h"></div>
            <div class="ch-v" id="ch-v"></div>
            <div class="ch-cell" id="ch-cell"></div>
        </div>
    </div>

    <div id="right-panel">
        <div id="stats">Not started</div>
        <div id="pause-hint">Click a cell to inspect</div>
        <div id="inspect-panel"></div>
    </div>
</div>

<div id="chart-wrap">
    <canvas id="chart"></canvas>
    <div id="chart-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#4caf50"></span>population</span>
        <span class="legend-item"><span class="legend-dot" style="background:#888"></span>food</span>
        <span class="legend-item"><span class="legend-dot" style="background:#e0a020"></span>total energy</span>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
